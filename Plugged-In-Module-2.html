<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plugged In · Module 2 — Secure Ownership</title>
<meta name="viewport" content="width=1280" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens-intro.jsx"></script>
<script type="text/babel" src="screens-module2.jsx"></script>

<script type="text/babel">
const { useState, useMemo } = React;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "showChrome": true
}/*EDITMODE-END*/;

// Module 2 standalone sequence
function buildSequence() {
  return [
    { id: "M2-00", label: "Module opener", module: "Module 2 · Secure Ownership", dark: true, kind: "opener" },
    { id: "2-01", label: "Offsite backup decision", module: "Module 2 · Secure Ownership", dark: false, kind: "offsite" },
    { id: "2-02", label: "Drive lifecycle", module: "Module 2 · Secure Ownership", dark: false, kind: "lifecycle" },
    { id: "2-03", label: "Sort it out", module: "Module 2 · Secure Ownership", dark: false, kind: "sort" },
    { id: "M2-END", label: "Module complete", module: "Module 2 · Secure Ownership", dark: true, kind: "end" },
  ];
}

// Module opener — restated objective + scaffold
function ModuleOpener({ onNext }) {
  return (
    <div className="title-stage fade-in" style={{ paddingRight: 100 }}>
      <div className="title-glow" />
      <div className="pre">Module 02 · Secure Ownership · 7–10 min</div>
      <h1 style={{ fontSize: 88 }}>
        Secure
        <span className="second">ownership.</span>
      </h1>
      <p className="sub" style={{ maxWidth: 560 }}>
        Six moments in the life of a flash drive — from where it comes from to how it ends. By the end of this module, you'll know how to handle a drive at every stage, not just when it's plugged in.
      </p>
      <div className="meta-row">
        <div className="item"><span>Objective</span><span className="v">Practice secure ownership</span></div>
        <div className="item"><span>Screens</span><span className="v">3 + close</span></div>
      </div>
      <button className="nav-btn gradient" style={{ marginTop: 36, padding: "16px 36px", fontSize: 15 }} onClick={onNext}>
        <span>Begin Module 2</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <div className="title-corner">
        <img src="assets/cyberco-gradient.png" alt="" />
      </div>
    </div>
  );
}

function ModuleEnd() {
  return (
    <div className="screen__inner fade-in" style={{ paddingTop: 72, justifyContent: "center" }}>
      <div className="eyebrow"><span className="num">M2-END</span> &nbsp;·&nbsp; Module 2 complete</div>
      <h2 className="display display--lg" style={{ marginTop: 18, maxWidth: 760 }}>
        You now own the <span className="gradient-text">whole drive lifecycle.</span>
      </h2>
      <p className="lede" style={{ marginTop: 22, maxWidth: 600 }}>
        Sourcing. Vetting. Use. Storage. Transfer. Disposal. Every drive that comes through your team has a clear path now — and you know what to do at every stage.
      </p>
      <p className="lede" style={{ marginTop: 14, maxWidth: 600, opacity: 0.7 }}>
        Up next, Module 3 covers what to look for once a drive is plugged in — the warning signs that mean an attack is in progress.
      </p>
      <div style={{ marginTop: 40, display: "flex", gap: 14 }}>
        <a href="Plugged-In-Module-1.html" className="nav-btn" style={{ textDecoration: "none" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back to Module 1</span>
        </a>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);
  const [stepIdx, setStepIdx] = useState(0);
  const [gates, setGates] = useState({});

  const sequence = useMemo(() => buildSequence(), []);
  const step = sequence[stepIdx];

  const next = () => setStepIdx(i => Math.min(i + 1, sequence.length - 1));
  const back = () => setStepIdx(i => Math.max(i - 1, 0));
  const markGate = (id) => setGates(g => ({ ...g, [id]: true }));

  let body = null;
  let nextDisabled = false;
  let nextLabel = "Continue";
  let hideBack = false;
  let hideNext = false;

  switch (step.kind) {
    case "opener":
      body = <ModuleOpener onNext={next} />;
      hideBack = true; hideNext = true;
      break;
    case "offsite":
      body = <OffsiteBackupScreen onResolved={() => markGate("2-01")} />;
      nextDisabled = !gates["2-01"];
      break;
    case "lifecycle":
      body = <LifecycleScreen onAllSeen={() => markGate("2-02")} />;
      nextDisabled = !gates["2-02"];
      break;
    case "sort":
      body = <SortItOutScreen onComplete={() => markGate("2-03")} />;
      nextDisabled = !gates["2-03"];
      nextLabel = "Finish Module 2";
      break;
    case "end":
      body = <ModuleEnd />;
      hideNext = true;
      break;
  }

  return (
    <div className="app-stage">
      <div className="browser">
        <div className="browser__bar">
          <div className="browser__lights">
            <span className="browser__light r" /><span className="browser__light y" /><span className="browser__light g" />
          </div>
          <div className="browser__url">
            <span className="lock">●</span>
            <span className="domain">learn.cyberco.com</span>
            <span className="path">/courses/plugged-in/module-2/{step.id.toLowerCase()}</span>
          </div>
          <div className="browser__chips">
            <div className="browser__chip">↻</div>
            <div className="browser__chip">⊕</div>
          </div>
        </div>
        <div
          className={`canvas ${step.dark ? "canvas--dark" : ""}`}
          data-screen-label={`${step.id} · ${step.label}`}
        >
          <CourseTop module={step.module} screen={step.id} dark={step.dark} showChrome={tweaks.showChrome} />
          <div className="screen" key={step.id}>{body}</div>
          <CourseBottom
            onBack={hideBack ? null : back}
            onNext={hideNext ? null : next}
            nextLabel={nextLabel}
            nextDisabled={nextDisabled || hideNext}
            hideBack={hideBack || stepIdx === 0}
            progress={stepIdx}
            total={sequence.length}
            dark={step.dark}
            showChrome={tweaks.showChrome && !hideNext}
          />
          {!tweaks.showChrome && (
            <div style={{ position: "absolute", bottom: 18, right: 24, fontFamily: "var(--mono)", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", opacity: 0.4, zIndex: 5 }}>
              {step.id}
            </div>
          )}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Course chrome">
          <TweakToggle
            label="Show top bar & navigation"
            value={tweaks.showChrome}
            onChange={(v) => setTweak("showChrome", v)}
          />
          <div style={{ fontSize: 12, opacity: 0.6, lineHeight: 1.4, marginTop: 4 }}>
            Hide for full-bleed canvas review.
          </div>
        </TweakSection>
        <TweakSection title="Jump to screen">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            {sequence.map((s, i) => (
              <button key={s.id}
                onClick={() => setStepIdx(i)}
                style={{
                  fontFamily: "var(--mono, monospace)", fontSize: 10, letterSpacing: "0.08em",
                  padding: "6px 8px", borderRadius: 4, cursor: "pointer", textAlign: "left",
                  background: i === stepIdx ? "#011D25" : "transparent",
                  color: i === stepIdx ? "#fff" : "inherit",
                  border: "1px solid rgba(0,0,0,0.15)",
                }}>
                {s.id} · {s.label}
              </button>
            ))}
          </div>
        </TweakSection>
        <TweakSection title="Other modules">
          <a href="Plugged-In-Module-1.html" style={{ display: "block", fontSize: 12, padding: "8px 10px", textDecoration: "none", color: "inherit", border: "1px solid rgba(0,0,0,0.15)", borderRadius: 4 }}>
            ← Module 1 · What Could Go Wrong
          </a>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>

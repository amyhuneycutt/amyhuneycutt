<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plugged In — Flash Drive Security</title>
<meta name="viewport" content="width=1280" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens-intro.jsx"></script>
<script type="text/babel" src="screens-module1.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "showChrome": true
}/*EDITMODE-END*/;

// Build the linear screen sequence based on path
function buildSequence(path) {
  // Each screen: { id, label, render, dark, gateKey? }
  return [
    { id: "I-01", label: "Title", module: "Intro", dark: true, kind: "title" },
    { id: "I-02", label: "Path select", module: "Intro", dark: true, kind: "path" },
    path === "B"
      ? { id: "I-03B", label: "Path B opening", module: "Intro · Path B", dark: true, kind: "pathB" }
      : { id: "I-03A", label: "Path A scenario", module: "Intro · Path A", dark: false, kind: "pathA" },
    { id: "I-04", label: "What's ahead", module: "Intro · Merge", dark: false, kind: "merge" },
    { id: "1-01", label: "The found drive", module: "Module 1 · What could go wrong", dark: false, kind: "found" },
    { id: "1-02", label: "How attacks work", module: "Module 1 · What could go wrong", dark: true, kind: "attacks" },
    { id: "1-04", label: "Myth vs. fact", module: "Module 1 · What could go wrong", dark: false, kind: "myth" },
  ];
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);
  const [path, setPath] = useState("A");
  const [stepIdx, setStepIdx] = useState(0);
  const [gates, setGates] = useState({});  // { "1-02": true, "1-04": true, "I-03A": true }

  const sequence = useMemo(() => buildSequence(path), [path]);
  const step = sequence[stepIdx];

  const next = () => {
    if (stepIdx === sequence.length - 1) {
      window.location.href = "Plugged-In-Module-2.html";
      return;
    }
    setStepIdx(i => Math.min(i + 1, sequence.length - 1));
  };
  const back = () => setStepIdx(i => Math.max(i - 1, 0));

  const markGate = (id) => setGates(g => ({ ...g, [id]: true }));

  // Per-screen content
  let body = null;
  let nextDisabled = false;
  let nextLabel = "Continue";
  let hideBack = false;
  let hideNext = false;

  switch (step.kind) {
    case "title":
      body = <TitleScreen onNext={next} />;
      hideBack = true; hideNext = true;
      break;
    case "path":
      body = <PathSelect onPick={(p) => { setPath(p); setStepIdx(2); }} />;
      hideNext = true;
      break;
    case "pathA":
      body = <PathA onResolved={() => markGate("I-03A")} />;
      nextDisabled = !gates["I-03A"];
      break;
    case "pathB":
      body = <PathB />;
      break;
    case "merge":
      body = <MergeScreen />;
      nextLabel = "Begin Module 1";
      break;
    case "found":
      body = <FoundDriveScreen onResolved={() => markGate("1-01")} />;
      nextDisabled = !gates["1-01"];
      break;
    case "attacks":
      body = <HowAttacksWork onAllSeen={() => markGate("1-02")} />;
      nextDisabled = !gates["1-02"];
      break;
    case "myth":
      body = <MythVsFact onAllFlipped={() => markGate("1-04")} />;
      nextDisabled = !gates["1-04"];
      nextLabel = "Start Module 2";
      break;
  }

  return (
    <div className="app-stage">
      <div className="browser">
        <div className="browser__bar">
          <div className="browser__lights">
            <span className="browser__light r" /><span className="browser__light y" /><span className="browser__light g" />
          </div>
          <div className="browser__url">
            <span className="lock">●</span>
            <span className="domain">learn.cyberco.com</span>
            <span className="path">/courses/plugged-in/{step.id.toLowerCase()}</span>
          </div>
          <div className="browser__chips">
            <div className="browser__chip">↻</div>
            <div className="browser__chip">⊕</div>
          </div>
        </div>
        <div
          className={`canvas ${step.dark ? "canvas--dark" : ""}`}
          data-screen-label={`${step.id} · ${step.label}`}
        >
          <CourseTop module={step.module} screen={step.id} dark={step.dark} showChrome={tweaks.showChrome} />
          <div className="screen" key={step.id /* re-mount per step to reset state */}>
            {body}
          </div>
          <CourseBottom
            onBack={hideBack ? null : back}
            onNext={hideNext ? null : next}
            nextLabel={nextLabel}
            nextDisabled={nextDisabled || hideNext}
            hideBack={hideBack || stepIdx === 0}
            progress={stepIdx}
            total={sequence.length}
            dark={step.dark}
            showChrome={tweaks.showChrome && !hideNext}
          />
          {/* Floating step counter when chrome is hidden */}
          {!tweaks.showChrome && (
            <div style={{ position: "absolute", bottom: 18, right: 24, fontFamily: "var(--mono)", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", opacity: 0.4, zIndex: 5 }}>
              {step.id}
            </div>
          )}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Course chrome">
          <TweakToggle
            label="Show top bar & navigation"
            value={tweaks.showChrome}
            onChange={(v) => setTweak("showChrome", v)}
          />
          <div style={{ fontSize: 12, opacity: 0.6, lineHeight: 1.4, marginTop: 4 }}>
            Hide to preview the screen as a full-bleed canvas — useful for stakeholder review of pure content.
          </div>
        </TweakSection>
        <TweakSection title="Jump to screen">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            {sequence.map((s, i) => (
              <button key={s.id}
                onClick={() => setStepIdx(i)}
                style={{
                  fontFamily: "var(--mono, monospace)", fontSize: 10, letterSpacing: "0.08em",
                  padding: "6px 8px", borderRadius: 4, cursor: "pointer", textAlign: "left",
                  background: i === stepIdx ? "#011D25" : "transparent",
                  color: i === stepIdx ? "#fff" : "inherit",
                  border: "1px solid rgba(0,0,0,0.15)",
                }}>
                {s.id} · {s.label}
              </button>
            ))}
          </div>
        </TweakSection>
        <TweakSection title="Path">
          <TweakRadio
            value={path}
            onChange={(v) => { setPath(v); /* reset to path step */ if (stepIdx >= 2) setStepIdx(2); }}
            options={[{ value: "A", label: "A · New" }, { value: "B", label: "B · Incident" }]}
          />
        </TweakSection>
        <TweakSection title="Other modules">
          <a href="Plugged-In-Module-2.html" style={{ display: "block", fontSize: 12, padding: "8px 10px", textDecoration: "none", color: "inherit", border: "1px solid rgba(0,0,0,0.15)", borderRadius: 4 }}>
            Module 2 · Secure Ownership →
          </a>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
